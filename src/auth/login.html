<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f5; }
        main { max-width: 400px; width: 100%; padding: 20px; }
        #message-container { margin-top: 15px; padding: 10px; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>
    <main>
        <section>
            <h2>Welcome Back!</h2>
            <form id="login-form" action="src/auth/auth.php" method="POST">
                <fieldset>
                    <legend>Secure Login</legend>
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="8">
                    <button type="submit" id="login">Log In</button>
                </fieldset>
                <div id="message-container"></div>
            </form>
        </section>
    </main>
    <script src="src/auth/login.js" defer></script>
</body>
</html>
