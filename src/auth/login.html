<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;background:#f0f0f0}
        .card{background:white;padding:2rem;border-radius:8px;width:300px}
        input{width:100%;padding:8px;margin:5px 0 15px}
        button{width:100%;padding:10px;background:#007bff;color:white;border:none;cursor:pointer}
        #message-container{margin-top:10px;color:red;font-size:14px}
    </style>
</head>
<body>
<div class="card">
    <h2>Welcome Back!</h2>
    <form id="login-form" action="src/auth/auth.php" method="POST">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="8">
        <button type="submit" id="login">Log In</button>
        <div id="message-container"></div>
    </form>
</div>
<script src="src/auth/login.js" defer></script>
</body>
</html>
