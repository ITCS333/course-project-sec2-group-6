
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { cursor: pointer; background-color: #f2f2f2; }
        .delete-btn, .edit-btn { margin: 0 5px; padding: 5px 10px; cursor: pointer; }
        .delete-btn { background: #d32f2f; color: white; border: none; border-radius: 3px; }
        .edit-btn { background: #1976d2; color: white; border: none; border-radius: 3px; }
        #search-input { margin-bottom: 15px; padding: 8px; width: 100%; max-width: 300px; }
        details { margin-bottom: 20px; }
    </style>
</head>
<body>
    <main class="container">
        <header><h1>Admin Portal</h1></header>
        <section>
            <h2>Change Your Password</h2>
            <form action="#" id="password-form">
                <fieldset>
                    <legend>Password Update</legend>
                    <label for="current-password">Current Password</label>
                    <input type="password" id="current-password" required>
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" minlength="8" required>
                    <label for="confirm-password">Confirm New Password</label>
                    <input type="password" id="confirm-password" required>
                    <button type="submit" id="change">Update Password</button>
                </fieldset>
            </form>
        </section>
        <section>
            <h2>Manage Users</h2>
            <details>
                <summary>Add New User</summary>
                <form action="#" id="add-user-form">
                    <fieldset>
                        <legend>New User Information</legend>
                        <label for="user-name">Full Name</label>
                        <input type="text" id="user-name" required>
                        <label for="user-email">Email</label>
                        <input type="email" id="user-email" required>
                        <label for="default-password">Default Password</label>
                        <input type="password" id="default-password" minlength="8" required>
                        <label for="is-admin">Role</label>
                        <select id="is-admin">
                            <option value="0">Student</option>
                            <option value="1">Admin</option>
                        </select>
                        <button type="submit" id="add">Add User</button>
                    </fieldset>
                </form>
            </details>
            <h3>Registered Users</h3>
            <input type="text" id="search-input" placeholder="Search by name or email...">
            <table id="user-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Admin</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="user-table-body"></tbody>
            </table>
        </section>
    </main>
    <script src="src/admin/users.js" defer></script>
</body>
</html>
