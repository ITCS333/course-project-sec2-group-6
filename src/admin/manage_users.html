<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
<script src="../js/manage_users.js" defer></script>
</head>

<body>

<h1>Admin Portal</h1>

<form id="add-user-form">
<input id="user-name" placeholder="Name">
<input id="user-email" placeholder="Email">
<input id="default-password" placeholder="Password">
<select id="is-admin">
<option value="0">Student</option>
<option value="1">Admin</option>
</select>
<button>Add</button>
</form>

<input id="search-input" placeholder="Search">

<table border="1">
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Admin</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="user-table-body"></tbody>
</table>

</body>
</html>
